agent:
  llm_model: gpt-4o-mini
  max_turns: 10
  temperature: 0.0
eval:
  n_agent_test_cases: 50
  n_test_users: 100
  recsys_k: 10
  wandb_project: multimodal-recsys-agent
inference:
  max_new_tokens: 512
  quantization: int4
recsys:
  dropout: 0.5
  hidden_dims:
  - 600
  - 200
  kl_anneal_steps: 10000
  latent_dim: 64
retrieval:
  collection_name: content_db
  embed_model: BAAI/bge-large-en-v1.5
  qdrant_url: http://localhost:6333
  rerank_top_n: 5
  reranker_model: BAAI/bge-reranker-v2-m3
  rrf_k: 60
  top_k: 20
training:
  batch_size: 512
  checkpoint_dir: checkpoints
  eval_every: 5
  log_wandb: true
  lr: 0.001
  n_epochs: 50
  n_val_users: 1000
  num_workers: 0
  train_path: data/processed/train.npz
  val_path: data/processed/val.npz
  weight_decay: 0.01
two_tower:
  batch_size: 512
  embed_dim: 64
  lr: 0.01
  n_epochs: 30
  weight_decay: 0.01
