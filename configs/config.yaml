recsys:
  latent_dim: 64
  hidden_dims: [600, 200]
  dropout: 0.5
  kl_anneal_steps: 10000      # linear anneal 0 → 1 over 10K steps

training:
  train_path: data/processed/train.npz
  val_path: data/processed/val.npz
  checkpoint_dir: checkpoints
  n_epochs: 50
  batch_size: 512
  lr: 0.001
  weight_decay: 0.01
  eval_every: 5               # run val every N epochs
  n_val_users: 1000           # fixed val panel — not all 162K
  num_workers: 4
  log_wandb: true

retrieval:
  qdrant_url: "http://localhost:6333"
  collection_name: "content_db"
  embed_model: "BAAI/bge-large-en-v1.5"
  reranker_model: "BAAI/bge-reranker-v2-m3"
  rrf_k: 60
  top_k: 20
  rerank_top_n: 5

agent:
  llm_model: "gpt-4o-mini"
  temperature: 0.0
  max_turns: 10

inference:
  quantization: "int4"
  max_new_tokens: 512

eval:
  recsys_k: 10
  n_test_users: 100
  n_agent_test_cases: 50
  wandb_project: "multimodal-recsys-agent"

two_tower:
  embed_dim: 64
  batch_size: 512             # larger = more in-batch negatives = better signal
  lr: 1e-3
  weight_decay: 0.01
  n_epochs: 30
